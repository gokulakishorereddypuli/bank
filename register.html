<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account · SecureTrust Bank</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <h3 class="mb-1">Create your account</h3>
    <p class="text-muted small mb-4">A savings account is opened automatically</p>
    <div id="alertBox"></div>
    <form id="regForm" novalidate>
      <div class="mb-3">
        <label class="form-label small fw-semibold">Full name</label>
        <input type="text" class="form-control" id="name" required>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">Email address</label>
        <input type="email" class="form-control" id="email" required>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">Phone number</label>
        <input type="text" class="form-control" id="phone" maxlength="10" placeholder="10 digit number" required>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">Password</label>
        <input type="password" class="form-control" id="password" minlength="6" required>
      </div>
      <div class="mb-3">
        <label class="form-label small fw-semibold">Confirm password</label>
        <input type="password" class="form-control" id="confirmPassword" minlength="6" required>
      </div>
      <button type="submit" class="btn btn-navy w-100 py-2" id="regBtn">Create Account</button>
    </form>
    <p class="text-center small mt-3 mb-0">Already have an account? <a href="index.html" class="fw-semibold">Sign in</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/utils.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script>
(async function init() {
  await openDB();
  await seedIfEmpty();

  document.getElementById('regForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertBox = document.getElementById('alertBox');
    alertBox.innerHTML = '';
    const btn = document.getElementById('regBtn');
    btn.disabled = true; btn.textContent = 'Creating…';
    try {
      await Auth.register({
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        password: document.getElementById('password').value,
        confirmPassword: document.getElementById('confirmPassword').value
      });
      await Auth.login(document.getElementById('email').value, document.getElementById('password').value);
      window.location.href = 'dashboard.html';
    } catch (err) {
      alertBox.innerHTML = `<div class="alert alert-danger py-2 small">${Util.escapeHtml(err.message)}</div>`;
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  });
})();
</script>
</body>
</html>
