<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · SecureTrust Bank</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="appShell"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="js/utils.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script src="js/accounts.js"></script>
<script src="js/transactions.js"></script>
<script src="js/loans.js"></script>
<script src="js/creditcards.js"></script>
<script>
(async function init() {
  await openDB();
  const user = await Auth.requireAuth();
  if (!user) return;
  if (user.role === 'admin') { window.location.href = 'admin.html'; return; }
  renderShell(user, 'Dashboard');

  const accounts = await Accounts.listForCustomer(user.id);
  const totalBalance = accounts.filter(a => a.status === 'active').reduce((s, a) => s + a.balance, 0);
  const loans = await Loans.listForCustomer(user.id);
  const activeLoans = loans.filter(l => l.status === 'approved');
  const cards = await CreditCards.listForCustomer(user.id);
  const activeCard = cards.find(c => c.status === 'active');

  let allTx = [];
  for (const a of accounts) allTx = allTx.concat((await Transactions.history(a.id)).map(t => ({ ...t, accNo: a.accountNumber })));
  allTx.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  const recentTx = allTx.slice(0, 6);

  document.getElementById('pageContent').innerHTML = `
    <div class="row g-3 mb-3">
      <div class="col-6 col-lg-3">
        <div class="stat-card">
          <div class="d-flex justify-content-between align-items-start">
            <div><div class="label">Total Balance</div><div class="value">${Util.formatCurrency(totalBalance)}</div></div>
            <div class="icon-wrap" style="background:rgba(46,196,182,.15);color:#1B9C90;"><i class="bi bi-wallet2"></i></div>
          </div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="stat-card">
          <div class="d-flex justify-content-between align-items-start">
            <div><div class="label">Accounts</div><div class="value">${accounts.length}</div></div>
            <div class="icon-wrap" style="background:rgba(11,37,69,.08);color:#0B2545;"><i class="bi bi-bank"></i></div>
          </div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="stat-card">
          <div class="d-flex justify-content-between align-items-start">
            <div><div class="label">Active Loans</div><div class="value">${activeLoans.length}</div></div>
            <div class="icon-wrap" style="background:rgba(255,193,7,.18);color:#8a6500;"><i class="bi bi-cash-coin"></i></div>
          </div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="stat-card">
          <div class="d-flex justify-content-between align-items-start">
            <div><div class="label">Card Outstanding</div><div class="value">${activeCard ? Util.formatCurrency(activeCard.outstanding) : '—'}</div></div>
            <div class="icon-wrap" style="background:rgba(230,57,70,.12);color:#E63946;"><i class="bi bi-credit-card-2-front"></i></div>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-3 mb-3">
      <div class="col-lg-7">
        <div class="card-soft p-3 h-100">
          <h6 class="mb-3">Balance trend (last 6 transactions)</h6>
          <canvas id="trendChart" height="160"></canvas>
        </div>
      </div>
      <div class="col-lg-5">
        <div class="card-soft p-3 h-100">
          <h6 class="mb-3">Account balance split</h6>
          <canvas id="splitChart" height="160"></canvas>
        </div>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-lg-7">
        <div class="card-soft p-3">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h6 class="mb-0">Recent transactions</h6>
            <a href="transactions.html" class="small">View all</a>
          </div>
          <div class="table-responsive">
            <table class="table table-soft mb-0">
              <thead><tr><th>Date</th><th>Description</th><th>Account</th><th class="text-end">Amount</th></tr></thead>
              <tbody>
                ${recentTx.length ? recentTx.map(t => `
                  <tr>
                    <td>${Util.formatDate(t.createdAt, false)}</td>
                    <td>${Util.escapeHtml(t.description)}</td>
                    <td class="mono small">${t.accNo}</td>
                    <td class="text-end fw-semibold ${t.type === 'CR' ? 'text-success' : 'text-danger'}">${t.type === 'CR' ? '+' : '-'}${Util.formatCurrency(t.amount)}</td>
                  </tr>`).join('') : `<tr><td colspan="4" class="empty-state">No transactions yet</td></tr>`}
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="col-lg-5">
        <div class="card-soft p-3">
          <h6 class="mb-3">Loans &amp; cards summary</h6>
          ${loans.length === 0 ? '<p class="text-muted small">No loans applied yet.</p>' : loans.slice(0,3).map(l => `
            <div class="d-flex justify-content-between align-items-center border-bottom py-2">
              <div>
                <div class="small fw-semibold text-capitalize">${l.type} loan</div>
                <div class="text-muted" style="font-size:.78rem;">EMI ${Util.formatCurrency(l.emi)}/mo</div>
              </div>
              <span class="badge badge-${l.status}">${l.status}</span>
            </div>`).join('')}
          ${activeCard ? `
            <div class="d-flex justify-content-between align-items-center pt-3">
              <div>
                <div class="small fw-semibold">Credit Card •• ${activeCard.cardNumber.slice(-4)}</div>
                <div class="text-muted" style="font-size:.78rem;">Limit ${Util.formatCurrency(activeCard.limit)}</div>
              </div>
              <span class="badge badge-active">active</span>
            </div>` : ''}
        </div>
      </div>
    </div>
  `;

  // Charts
  const trendLabels = recentTx.slice().reverse().map(t => Util.formatDate(t.createdAt, false));
  const trendData = recentTx.slice().reverse().map(t => t.balanceAfter);
  new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: { labels: trendLabels, datasets: [{ label: 'Balance', data: trendData, borderColor: '#2EC4B6', backgroundColor: 'rgba(46,196,182,.15)', fill: true, tension: .3 }] },
    options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: false } } }
  });

  new Chart(document.getElementById('splitChart'), {
    type: 'doughnut',
    data: {
      labels: accounts.map(a => `${a.type} (${a.accountNumber.slice(-4)})`),
      datasets: [{ data: accounts.map(a => a.balance), backgroundColor: ['#0B2545', '#2EC4B6', '#8a6500', '#E63946'] }]
    },
    options: { plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 11 } } } } }
  });
})();
</script>
</body>
</html>
