<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accounts · SecureTrust Bank</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="appShell"></div>

<div class="modal fade" id="newAccountModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Open a new account</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <div id="newAccAlert"></div>
        <label class="form-label small fw-semibold">Account type</label>
        <select class="form-select" id="accType">
          <option value="savings">Savings Account</option>
          <option value="current">Current Account</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-navy" id="createAccBtn">Open Account</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/utils.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script src="js/accounts.js"></script>
<script src="js/transactions.js"></script>
<script>
let CURRENT_USER = null;

async function loadAccounts() {
  const accounts = await Accounts.listForCustomer(CURRENT_USER.id);
  document.getElementById('pageContent').innerHTML = `
    <div class="d-flex justify-content-between align-items-center mb-3">
      <p class="text-muted mb-0 small">Manage your savings and current accounts</p>
      <button class="btn btn-teal btn-sm" data-bs-toggle="modal" data-bs-target="#newAccountModal"><i class="bi bi-plus-lg"></i> Open Account</button>
    </div>
    <div class="row g-3" id="accGrid"></div>
  `;
  const grid = document.getElementById('accGrid');
  if (!accounts.length) {
    grid.innerHTML = `<div class="col-12"><div class="card-soft empty-state"><i class="bi bi-wallet2 fs-2 mb-2 d-block"></i>No accounts yet. Open one to get started.</div></div>`;
    return;
  }
  for (const a of accounts) {
    const col = document.createElement('div');
    col.className = 'col-md-6 col-xl-4';
    col.innerHTML = `
      <div class="card-soft p-3 h-100">
        <div class="d-flex justify-content-between align-items-start mb-2">
          <span class="badge text-bg-light text-uppercase">${a.type}</span>
          <span class="badge badge-${a.status === 'active' ? 'active' : 'inactive'}">${a.status}</span>
        </div>
        <div class="text-muted small">Account Number</div>
        <div class="mono fw-semibold mb-2">${a.accountNumber}</div>
        <div class="text-muted small">Available Balance</div>
        <div class="fs-4 fw-bold text-navy mb-3" style="color:#0B2545;">${Util.formatCurrency(a.balance)}</div>
        <div class="d-flex gap-2">
          <a href="transactions.html?acc=${a.id}" class="btn btn-sm btn-outline-secondary flex-fill">Transact</a>
          <a href="statements.html?acc=${a.id}" class="btn btn-sm btn-outline-secondary flex-fill">Statement</a>
        </div>
      </div>`;
    grid.appendChild(col);
  }
}

(async function init() {
  await openDB();
  CURRENT_USER = await Auth.requireAuth();
  if (!CURRENT_USER) return;
  if (CURRENT_USER.role === 'admin') { window.location.href = 'admin.html'; return; }
  renderShell(CURRENT_USER, 'Accounts');
  await loadAccounts();

  document.getElementById('createAccBtn').addEventListener('click', async () => {
    const alertBox = document.getElementById('newAccAlert');
    alertBox.innerHTML = '';
    try {
      await Accounts.create(CURRENT_USER.id, document.getElementById('accType').value);
      bootstrap.Modal.getInstance(document.getElementById('newAccountModal')).hide();
      Util.toast('Account opened successfully.');
      await loadAccounts();
    } catch (err) {
      alertBox.innerHTML = `<div class="alert alert-danger py-2 small">${Util.escapeHtml(err.message)}</div>`;
    }
  });
})();
</script>
</body>
</html>
