<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statements · SecureTrust Bank</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="appShell"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
<script src="js/utils.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script src="js/accounts.js"></script>
<script src="js/transactions.js"></script>
<script src="js/statements.js"></script>
<script>
let CURRENT_USER = null, ACCOUNTS = [], CURRENT_LIST = [], CURRENT_ACC = null;

function renderTable(list) {
  const tbody = document.getElementById('stmtTbody');
  tbody.innerHTML = list.length ? list.map(t => `
    <tr>
      <td>${Util.formatDate(t.createdAt)}</td>
      <td class="mono small">${t.refNo}</td>
      <td>${Util.escapeHtml(t.description)}</td>
      <td><span class="badge badge-${t.type.toLowerCase()}">${t.type}</span></td>
      <td class="text-end">${Util.formatCurrency(t.amount)}</td>
      <td class="text-end mono">${Util.formatCurrency(t.balanceAfter)}</td>
    </tr>`).join('') : `<tr><td colspan="6" class="empty-state">No transactions in this period</td></tr>`;
}

async function loadAccountSelect(preselect) {
  const sel = document.getElementById('stmtAcc');
  sel.innerHTML = ACCOUNTS.map(a => `<option value="${a.id}" ${a.id === preselect ? 'selected' : ''}>${a.accountNumber} — ${a.type}</option>`).join('');
}

(async function init() {
  await openDB();
  CURRENT_USER = await Auth.requireAuth();
  if (!CURRENT_USER) return;
  if (CURRENT_USER.role === 'admin') { window.location.href = 'admin.html'; return; }
  renderShell(CURRENT_USER, 'Statements');

  ACCOUNTS = await Accounts.listForCustomer(CURRENT_USER.id);
  if (!ACCOUNTS.length) {
    document.getElementById('pageContent').innerHTML = `<div class="card-soft empty-state">Open an account first to view statements.</div>`;
    return;
  }
  const params = new URLSearchParams(window.location.search);
  const preselect = params.get('acc') || ACCOUNTS[0].id;

  const today = new Date();
  const firstOfMonth = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().slice(0, 10);
  const todayStr = today.toISOString().slice(0, 10);

  document.getElementById('pageContent').innerHTML = `
    <div class="card-soft p-3 mb-3">
      <div class="row g-2 align-items-end">
        <div class="col-md-3"><label class="form-label small">Account</label><select class="form-select" id="stmtAcc"></select></div>
        <div class="col-md-3"><label class="form-label small">Statement type</label>
          <select class="form-select" id="stmtType">
            <option value="mini">Mini Statement (last 10)</option>
            <option value="monthly">Monthly Statement</option>
            <option value="range">Date Range</option>
          </select>
        </div>
        <div class="col-md-2 stmt-range-field d-none"><label class="form-label small">From</label><input type="date" class="form-control" id="stmtFrom" value="${firstOfMonth}"></div>
        <div class="col-md-2 stmt-range-field d-none"><label class="form-label small">To</label><input type="date" class="form-control" id="stmtTo" value="${todayStr}"></div>
        <div class="col-md-2"><button class="btn btn-navy w-100" id="loadStmtBtn">Generate</button></div>
      </div>
    </div>
    <div class="card-soft p-3">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="mb-0" id="stmtTitle">Mini Statement</h6>
        <button class="btn btn-sm btn-outline-secondary" id="exportPdfBtn"><i class="bi bi-file-earmark-pdf"></i> Export PDF</button>
      </div>
      <div class="table-responsive">
        <table class="table table-soft mb-0">
          <thead><tr><th>Date</th><th>Ref No</th><th>Description</th><th>Type</th><th class="text-end">Amount</th><th class="text-end">Balance</th></tr></thead>
          <tbody id="stmtTbody"></tbody>
        </table>
      </div>
    </div>
  `;

  await loadAccountSelect(preselect);

  document.getElementById('stmtType').addEventListener('change', (e) => {
    document.querySelectorAll('.stmt-range-field').forEach(el => el.classList.toggle('d-none', e.target.value !== 'range'));
  });

  async function generate() {
    const accId = document.getElementById('stmtAcc').value;
    const type = document.getElementById('stmtType').value;
    CURRENT_ACC = await Accounts.get(accId);
    let title = 'Mini Statement';
    if (type === 'mini') {
      CURRENT_LIST = await Statements.mini(accId);
    } else if (type === 'monthly') {
      const now = new Date();
      CURRENT_LIST = await Statements.monthly(accId, now.getFullYear(), now.getMonth());
      title = `Monthly Statement — ${now.toLocaleDateString('en-IN', { month: 'long', year: 'numeric' })}`;
    } else {
      const from = document.getElementById('stmtFrom').value;
      const to = document.getElementById('stmtTo').value;
      CURRENT_LIST = await Statements.range(accId, from, to);
      title = `Statement: ${Util.formatDate(from, false)} – ${Util.formatDate(to, false)}`;
    }
    document.getElementById('stmtTitle').textContent = title;
    renderTable(CURRENT_LIST);
  }

  document.getElementById('loadStmtBtn').addEventListener('click', generate);
  document.getElementById('stmtAcc').addEventListener('change', generate);
  await generate();

  document.getElementById('exportPdfBtn').addEventListener('click', async () => {
    await Statements.exportPdf(CURRENT_ACC, CURRENT_USER, CURRENT_LIST, document.getElementById('stmtTitle').textContent);
  });
})();
</script>
</body>
</html>
